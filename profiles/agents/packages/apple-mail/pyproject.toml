[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[project]
name = "apple-mail-mcp"
version = "0.2.0"
description = "Apple Mail MCP server (JXA bridge) — read/search/draft across Mail.app accounts"
requires-python = ">=3.11"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "mcp>=1",
]

scripts.apple-mail-mcp = "apple_mail_mcp.server:run"

[tool.hatch.build.targets.wheel]
packages = [ "apple_mail_mcp" ]
