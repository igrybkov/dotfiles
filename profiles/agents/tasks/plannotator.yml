---
# Install plannotator binary from GitHub releases
# https://github.com/backnotprop/plannotator

- name: "[🔌 plannotator] Check if plannotator is installed"
  ansible.builtin.command: which plannotator
  register: _plannotator_check
  changed_when: false
  failed_when: false

- name: "[🔌 plannotator] Get latest release tag"
  ansible.builtin.uri:
    url: https://api.github.com/repos/backnotprop/plannotator/releases/latest
    return_content: true
  register: _plannotator_release
  when: _plannotator_check.rc != 0

- name: "[🔌 plannotator] Set platform variables"
  ansible.builtin.set_fact:
    _plannotator_os: "{{ 'darwin' if hostvars['localhost']['ansible_facts']['system'] == 'Darwin' else 'linux' }}"
    _plannotator_arch: "{{ 'arm64' if hostvars['localhost']['ansible_facts']['architecture'] == 'arm64' else 'x64' }}"
    _plannotator_version: "{{ (_plannotator_release.json.tag_name | default('v0.0.0'))[1:] }}"
  when: _plannotator_check.rc != 0

- name: "[🔌 plannotator] Ensure ~/.local/bin exists"
  ansible.builtin.file:
    path: "~/.local/bin"
    state: directory
    mode: "0755"
  when: _plannotator_check.rc != 0

- name: "[🔌 plannotator] Download binary"
  ansible.builtin.get_url:
    url: "https://github.com/backnotprop/plannotator/releases/download/v{{ _plannotator_version }}/plannotator-{{ _plannotator_os }}-{{ _plannotator_arch }}"
    dest: "~/.local/bin/plannotator"
    mode: "0755"
  when: _plannotator_check.rc != 0
