---
# Install/update plannotator binary from GitHub releases
# https://github.com/backnotprop/plannotator

- name: "[🔌 plannotator] Install/update plannotator"
  ansible.builtin.include_role:
    name: github_binary
  vars:
    github_binaries:
      - name: plannotator
        repo: backnotprop/plannotator
        asset_darwin_arm64: plannotator-darwin-arm64
        asset_darwin_x86_64: plannotator-darwin-x64
        asset_linux: plannotator-linux-x64
        type: binary
