# ~/.config/tmux/tmux.conf
# Tuned for Claude Code and general AI CLI workflows.

# --- General --------------------------------------------------------------

# Use Ctrl+a as prefix (easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color + italics
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB,alacritty:RGB,ghostty:RGB"

# Claude Code needs extended keys for Shift+Enter newlines and passthrough
# for image paste / desktop notifications / progress bar to reach the
# outer terminal (iTerm2, Ghostty, Kitty, etc.).
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -s set-clipboard on
set -g allow-passthrough on

# Responsiveness
set -s escape-time 10
set -g focus-events on
set -g history-limit 50000

# Windows / panes start at 1, renumber when one is closed
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on

# Mouse
set -g mouse on

# --- Key bindings ---------------------------------------------------------

# Intuitive splits that keep the current working directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows keep cwd too
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# --- Copy mode ------------------------------------------------------------

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# --- Status line (Catppuccin Mocha flavored) ------------------------------

set -g status-interval 5
set -g status-position top
set -g status-justify left

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "
set -g status-right "#[fg=#a6adc8]#{?client_prefix,⌨  ,}#[fg=#cdd6f4]%Y-%m-%d #[fg=#89b4fa,bold]%H:%M "

setw -g window-status-format         "#[fg=#a6adc8] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g message-style        "bg=#89b4fa,fg=#1e1e2e,bold"
set -g message-command-style "bg=#89b4fa,fg=#1e1e2e,bold"
