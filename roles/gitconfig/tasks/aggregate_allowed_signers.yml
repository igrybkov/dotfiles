---
# Aggregate allowed signers from all profiles into a single file
# Reads from _allowed_signers_entries (collected during profile fragment collection)
# Each entry has: email, key, profile, priority

- name: "[🔧 gitconfig] Ensure allowed signers directory exists"
  ansible.builtin.file:
    path: "{{ allowed_signers_file | dirname }}"
    state: directory
    mode: "0755"
  when: _allowed_signers_entries | length > 0

# yamllint disable rule:line-length
- name: "[🔧 gitconfig] Write aggregated allowed signers"
  ansible.builtin.copy:
    # yamllint disable-line rule:indentation
    content: "# Auto-generated by gitconfig role - do not edit manually\n# Aggregated from profile git_allowed_signers entries\n{% set resolved = _allowed_signers_entries | sort(attribute='priority') | resolve_op_secrets %}{% set ns = namespace(current_profile='') %}{% for entry in resolved %}{% if entry.profile != ns.current_profile %}\n# --- {{ entry.profile }} (priority {{ entry.priority }}) ---\n{% set ns.current_profile = entry.profile %}{% endif %}{{ entry.email }} {{ entry.key }}\n{% endfor %}"
    dest: "{{ allowed_signers_file }}"
    mode: "0644"
  when: _allowed_signers_entries | length > 0
# yamllint enable rule:line-length

- name: "[🔧 gitconfig] Remove allowed signers if no entries"
  ansible.builtin.file:
    path: "{{ allowed_signers_file }}"
    state: absent
  when: _allowed_signers_entries | length == 0
